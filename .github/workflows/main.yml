name: Mobile App Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  android-test:
    runs-on: ubuntu-latest # Fauran start hone ke liye Ubuntu server
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # Git LFS se badi base.apk download karne ke liye

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Appium and Dependencies
        run: |
          npm i -g appium
          appium driver install uiautomator2
          pip install Appium-Python-Client
          appium & # Appium server ko background mein start karna

      - name: Run Android Emulator and Execute Script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: |
            echo "Checking APK files..."
            # Pura path diya gaya hai taake folder easily mil jaye
            ls -lh SportsAppAuto/apks/
            
            echo "Installing Split APKs..."
            # Har file ke aage SportsAppAuto/ laga hai taake error na aaye
            adb install-multiple SportsAppAuto/apks/base.apk SportsAppAuto/apks/split_config.arm64_v8a.apk SportsAppAuto/apks/split_config.en.apk SportsAppAuto/apks/split_config.xxhdpi.apk
            
            echo "Running Python Script..."
            # cd aur python ko ek hi line mein jor diya hai
            cd SportsAppAuto && python automation.py

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Screenshots
          path: SportsAppAuto/*.png
